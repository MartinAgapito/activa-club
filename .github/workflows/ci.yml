# ============================================================
# .github/workflows/ci.yml
#
# Pull Request validation — runs on every PR to main and on
# push to main. Blocks merge if any job fails.
#
# Triggers:
#   pull_request -> main  : lint + test + build (backend & frontend)
#   push -> main          : same (catches direct merges)
#
# Jobs run in parallel:
#   backend   — ESLint, Jest, NestJS build (tsc via nest build)
#   frontend  — ESLint, tsc + Vite build, Vitest
#
# No Terraform steps here — terraform-dev.yml is the required
# status check that already runs fmt-check + validate on every PR.
# ============================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Test
        working-directory: backend
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
