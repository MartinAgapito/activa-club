name: Terraform Production

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
  pull_request:
    branches:
      - main
    paths:
      - "infrastructure/**"

# Cancel any in-progress run for the same branch/PR to avoid stale applies.
concurrency:
  group: terraform-production-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TF_VAR_env: production
  # Working directory for all Terraform steps.
  TF_WORKING_DIR: infrastructure/envs/production

# Required for OIDC token generation and for the PR comment step.
permissions:
  id-token: write   # Allows the job to request an OIDC token from GitHub.
  contents: read    # Allows checkout.
  pull-requests: write # Allows posting plan output as a PR comment.

jobs:
  # ---------------------------------------------------------------------------
  # Job: terraform-plan
  # Runs on every PR and every push to main.
  # Outputs the plan so the apply job can consume it without re-running init.
  # ---------------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      # Propagate whether there are changes to apply (used by apply job).
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Pass backend config via -backend-config flags so the bucket name
      # (which contains the account ID) is never hard-coded in source control.
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="encrypt=true" \
            -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # -detailed-exitcode: 0=no changes, 1=error, 2=changes present.
      # continue-on-error keeps the step green when exitcode=2 (changes exist).
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            -input=false \
            -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # Fail the job explicitly if terraform plan returned exit code 1 (error).
      - name: Check plan exit code
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan failed with errors."
          cat ${{ env.TF_WORKING_DIR }}/plan_output.txt
          exit 1

      # Post or update a sticky comment on the PR with the plan output.
      # On push to main (no PR) this step is skipped safely.
      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-production-plan
          message: |
            ### Terraform Production Plan

            <details>
            <summary>Show Plan Output</summary>

            ```hcl
            ${{ join(steps.plan.outputs.stdout, '') }}
            ```

            </details>

            > Triggered by commit `${{ github.sha }}` on branch `${{ github.head_ref }}`.

      # Upload the compiled plan as an artifact so the apply job can consume it
      # without re-running init + plan (saves time and avoids drift).
      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: terraform-apply
  # Runs ONLY on push to main (not on PRs).
  # Requires the plan job to succeed and uses the saved plan artifact.
  # ---------------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    # Only apply when merging/pushing to main AND there are actual changes.
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.terraform-plan.outputs.exitcode == '2'
    # Manual approval gate — configure a "production" environment in GitHub
    # repository settings (Settings > Environments) with required reviewers
    # to enforce human approval before apply.
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="encrypt=true" \
            -input=false

      # Download the plan artifact produced by the plan job to ensure we apply
      # exactly what was reviewed — no drift between plan and apply.
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      # Notify on failure via a workflow summary annotation.
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Terraform Apply Failed::The production apply failed. Check the logs above for details."
