# ============================================================
# .github/workflows/terraform-production.yml
#
# Unified Terraform Plan & Apply workflow for ActivaClub.
#
# Triggers:
#   - Any push to any branch that touches infrastructure/
#   - Any pull request targeting main that touches infrastructure/
#
# Jobs:
#   terraform — runs plan on every trigger, applies only on
#               push to main (after the 'production' environment
#               approval gate is satisfied).
#
# Authentication:
#   Uses OIDC to assume the IAM role created by the bootstrap.
#   No static AWS credentials are stored in GitHub secrets.
# ============================================================

name: Terraform Production

on:
  push:
    branches: ["**"]
    paths: ["infrastructure/**"]
  pull_request:
    branches: [main]
    paths: ["infrastructure/**"]

# Permissions required by the OIDC token request and PR comment posting
permissions:
  id-token: write   # Required to request the OIDC JWT
  contents: read    # Required to checkout the repository
  pull-requests: write # Required to post plan output as a PR comment

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "us-east-1"
  WORKING_DIR: infrastructure/envs/production
  # Backend configuration — matches the bootstrap-created resources
  TF_BACKEND_BUCKET: activa-club-tfstate-583075178346
  TF_BACKEND_KEY: production/terraform.tfstate
  TF_BACKEND_REGION: us-east-1
  TF_BACKEND_DYNAMODB_TABLE: activa-club-tflock

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    # The 'production' environment in GitHub requires manual approval
    # before the apply step runs. Configure reviewers in:
    # Settings > Environments > production > Required reviewers
    environment: production

    steps:
      # ----------------------------------------------------------
      # 1. Checkout source code
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Authenticate to AWS via OIDC
      # The role ARN is hard-coded because it is not a secret —
      # it is determined by the bootstrap and tied to this repo.
      # ----------------------------------------------------------
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::583075178346:role/activa-club-cicd-role
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------------------------------------
      # 3. Install the pinned Terraform version
      # ----------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ----------------------------------------------------------
      # 4. Initialize Terraform with the S3 remote backend
      # Backend values are passed at runtime to avoid hard-coding
      # them in the source (although the bucket name is not secret,
      # this pattern makes the workflow reusable across environments).
      # ----------------------------------------------------------
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      # ----------------------------------------------------------
      # 5. Format check — fails if any .tf file is not formatted
      # Run terraform fmt -recursive locally to fix violations.
      # ----------------------------------------------------------
      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      # ----------------------------------------------------------
      # 6. Validate — checks configuration syntax and internal
      # consistency without accessing any remote services.
      # ----------------------------------------------------------
      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      # ----------------------------------------------------------
      # 7. Plan — generates an execution plan and saves it to a file
      # The plan file is used by the apply step to ensure exactly
      # what was reviewed is what gets applied.
      # ----------------------------------------------------------
      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -out=tfplan

      # ----------------------------------------------------------
      # 8. Upload plan artifact — allows reviewers to inspect the
      # plan before approving the deployment in the GitHub UI.
      # ----------------------------------------------------------
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5

      # ----------------------------------------------------------
      # 9. Apply — only runs on push to main (not on PRs)
      # Uses the saved plan file so the apply matches what was planned.
      # The 'production' environment gate ensures manual approval.
      # ----------------------------------------------------------
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
