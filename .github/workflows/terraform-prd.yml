# ============================================================
# .github/workflows/terraform-prd.yml
#
# Triggers:
#   push tags prd-v* : plan + apply
#
# IAM Role : arn:aws:iam::583075178346:role/activa-club-terraform-prd-role
# Backend  : activa-club-tfstate-prd-583075178346 / activa-club-tflock-prd
# ============================================================

name: Terraform PRD

on:
  push:
    tags: ["prd-v*"]
    paths: ["infrastructure/**"]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.6.6"
  WORKING_DIR: infrastructure/envs/prd
  TF_BACKEND_BUCKET: activa-club-tfstate-prd-583075178346
  TF_BACKEND_KEY: prd/terraform.tfstate
  TF_BACKEND_REGION: us-east-1
  TF_BACKEND_DYNAMODB_TABLE: activa-club-tflock-prd

jobs:
  terraform-prd:
    name: Terraform PRD
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::583075178346:role/activa-club-terraform-prd-role
          aws-region: us-east-1
          role-session-name: GitHubActions-PRD

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -out=tfplan -var-file=prd.tfvars

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Terraform Apply
        if: startsWith(github.ref, 'refs/tags/prd-v')
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan
