# ============================================================
# .github/workflows/dev-apply.yml
#
# Terraform Apply workflow for the ActivaClub DEV environment.
#
# Triggers:
#   - Push to main that touches infrastructure/
#
# Authentication:
#   Uses OIDC to assume the IAM role created by the DEV bootstrap.
#   No static AWS credentials are stored in GitHub secrets.
#
# Required GitHub Secrets:
#   DEV_ACCOUNT_ID — AWS account ID of the DEV account.
#                    Used to construct the assume_role ARN and to
#                    pass the dev_account_id Terraform variable
#                    (which has no default).
#
# IAM Role assumed:
#   arn:aws:iam::<DEV_ACCOUNT_ID>:role/activa-club-terraform-dev-role
#   (created by infrastructure/envs/dev/bootstrap/iam.tf)
#
# Terraform backend:
#   Backend values are passed via -backend-config flags at init time.
#   The backend block in infrastructure/envs/dev/main.tf is empty (backend "s3" {}).
# ============================================================

name: Terraform DEV Apply

on:
  push:
    branches: [main]
    paths: ["infrastructure/**"]

# Minimum permissions required for OIDC token request and repo checkout.
# pull-requests: write is not needed here because this workflow never
# posts PR comments — it only runs on push to main.
permissions:
  id-token: write  # Required to request the OIDC JWT from GitHub
  contents: read   # Required to checkout the repository

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "us-east-1"
  WORKING_DIR: infrastructure/envs/dev
  TF_BACKEND_BUCKET: ac-tfstate-dev
  TF_BACKEND_KEY: dev/terraform.tfstate
  TF_BACKEND_REGION: us-east-1
  TF_BACKEND_DYNAMODB_TABLE: ac-tflock-dev

jobs:
  terraform-dev-apply:
    name: Terraform DEV Apply
    runs-on: ubuntu-latest
    # The 'dev' environment in GitHub can optionally be configured with
    # a required reviewer for an approval gate before apply runs.
    # Configure in: Settings > Environments > dev > Required reviewers
    environment: dev

    steps:
      # ----------------------------------------------------------
      # 1. Checkout source code
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Authenticate to AWS via OIDC
      #
      # The role ARN is constructed from DEV_ACCOUNT_ID because the
      # DEV account ID is not known at code-commit time and varies
      # per developer/organization setup. The role name is fixed and
      # matches the value created by the DEV bootstrap.
      # ----------------------------------------------------------
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.DEV_ACCOUNT_ID }}:role/activa-club-terraform-dev-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-DEV-Apply

      # ----------------------------------------------------------
      # 3. Install the pinned Terraform version
      #
      # Pinned to the same version used in the production workflow
      # and consistent with required_version = ">= 1.6" in main.tf.
      # ----------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ----------------------------------------------------------
      # 4. Initialize Terraform
      #
      # Backend values are passed via -backend-config because the
      # backend block in infrastructure/envs/dev/main.tf is empty.
      # ----------------------------------------------------------
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      # ----------------------------------------------------------
      # 5. Format check — fails if any .tf file is not formatted.
      # Run `terraform fmt -recursive` locally to fix violations.
      # ----------------------------------------------------------
      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      # ----------------------------------------------------------
      # 6. Validate — checks configuration syntax and internal
      # consistency without accessing remote services.
      # ----------------------------------------------------------
      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      # ----------------------------------------------------------
      # 7. Plan — generates an execution plan and saves it to a file.
      # dev_account_id has no default in variables.tf and must be
      # supplied explicitly; all other variables have defaults.
      # ----------------------------------------------------------
      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -var="dev_account_id=${{ secrets.DEV_ACCOUNT_ID }}"

      # ----------------------------------------------------------
      # 8. Upload plan artifact — allows inspection of the plan
      # before or after the apply in the GitHub Actions UI.
      # ----------------------------------------------------------
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 3

      # ----------------------------------------------------------
      # 9. Apply — runs unconditionally on every push to main that
      # reaches this step. The trigger filter (branches: [main])
      # already ensures this job only runs on main pushes.
      # Uses the saved plan file so apply matches exactly what
      # was planned in the previous step.
      # ----------------------------------------------------------
      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan
