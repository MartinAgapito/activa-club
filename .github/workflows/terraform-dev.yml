# ============================================================
# .github/workflows/terraform-dev.yml
#
# Triggers:
#   pull_request -> main  : fmt + validate + plan (no apply)
#   push -> main          : fmt + validate + plan + apply
#
# IAM Role : arn:aws:iam::463310123916:role/activa-club-terraform-dev-role
# Backend  : activa-club-tfstate-dev-463310123916 / activa-club-tflock-dev
# ============================================================

name: Terraform DEV

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths: ["infrastructure/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.6.6"
  WORKING_DIR: infrastructure/envs/dev
  TF_BACKEND_BUCKET: activa-club-tfstate-dev-463310123916
  TF_BACKEND_KEY: dev/terraform.tfstate
  TF_BACKEND_REGION: us-east-1
  TF_BACKEND_DYNAMODB_TABLE: activa-club-tflock-dev

jobs:
  terraform-dev:
    name: Terraform DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::463310123916:role/activa-club-terraform-dev-role
          aws-region: us-east-1
          role-session-name: GitHubActions-DEV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -diff -recursive

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      # ── Bootstrap: runs BEFORE plan so the plan reflects the real state ──────
      # On first deploy the artifacts S3 bucket doesn't exist yet and there
      # is no members.zip. We create the bucket via a targeted apply, then
      # upload a minimal placeholder so Terraform can create the Lambda
      # function. The real artifact is deployed by deploy-members-dev.yml.
      - name: Bootstrap Lambda artifact bucket (first-time only)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Create just the S3 bucket resources (idempotent, updates state)
          terraform apply -auto-approve -input=false \
            -target=aws_s3_bucket.lambda_artifacts \
            -target=aws_s3_bucket_versioning.lambda_artifacts \
            -target=aws_s3_bucket_public_access_block.lambda_artifacts \
            -var-file=dev.tfvars

          # Upload stubs only if the real artifacts are not there yet
          BUCKET="activa-club-lambda-artifacts-dev"
          echo 'exports.handler=async()=>({statusCode:503,body:"Deploying..."})' \
            > /tmp/index.js
          zip -j /tmp/stub.zip /tmp/index.js

          for KEY in \
            "members/members.zip" \
            "reservations/reservations.zip" \
            "reservations/reservations-expirer.zip"; do
            if ! aws s3 ls "s3://${BUCKET}/${KEY}" 2>/dev/null; then
              echo "No artifact found for ${KEY} — uploading stub"
              aws s3 cp /tmp/stub.zip "s3://${BUCKET}/${KEY}"
            fi
          done

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -var-file=dev.tfvars

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 3

      # Apply only on push to main or manual dispatch, not on pull requests
      - name: Terraform Apply
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan
