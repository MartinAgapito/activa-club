# ============================================================
# .github/workflows/deploy-frontend-prd.yml
#
# Builds the React SPA, uploads dist/ to the frontend S3 bucket,
# and invalidates the CloudFront cache.
#
# Triggers:
#   push tags prd-v*
#
# IAM Role  : arn:aws:iam::583075178346:role/activa-club-terraform-prd-role
# S3 Bucket : activa-club-frontend-prd
# CloudFront: queried dynamically from the bucket origin
#
# Required GitHub Environment secrets (environment: prd):
#   VITE_API_BASE_URL           — API Gateway base URL (e.g. https://xxxx.execute-api.us-east-1.amazonaws.com)
#   VITE_COGNITO_USER_POOL_ID   — Cognito User Pool ID
#   VITE_COGNITO_CLIENT_ID      — Cognito App Client ID
# ============================================================

name: Deploy Frontend (PRD)

on:
  push:
    tags: ["prd-v*"]

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "20"
  FRONTEND_BUCKET: activa-club-frontend-prd
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend (PRD)
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::583075178346:role/activa-club-terraform-prd-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-DeployFrontend-PRD

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React SPA
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: npm run build

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Sync dist/ to S3
        run: |
          # Guard: skip if bucket doesn't exist yet (Terraform not applied)
          if ! aws s3api head-bucket --bucket "${{ env.FRONTEND_BUCKET }}" 2>/dev/null; then
            echo "Bucket ${{ env.FRONTEND_BUCKET }} does not exist yet — Terraform may not have applied."
            echo "Re-run this workflow after terraform-prd.yml completes."
            exit 0
          fi

          aws s3 sync frontend/dist/ "s3://${{ env.FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html must not be cached — browsers need to fetch the latest
          aws s3 cp frontend/dist/index.html "s3://${{ env.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # ── Invalidate ────────────────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          BUCKET_ORIGIN="${{ env.FRONTEND_BUCKET }}.s3.us-east-1.amazonaws.com"
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName=='${BUCKET_ORIGIN}'].Id" \
            --output text)

          if [ -z "$DIST_ID" ]; then
            echo "CloudFront distribution not found for bucket origin ${BUCKET_ORIGIN}"
            echo "Skipping invalidation — Terraform may not have applied yet."
            exit 0
          fi

          echo "Invalidating CloudFront distribution: ${DIST_ID}"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
